<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Daily Report - {{DATE}}</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --tag-bg: #1f2937;
      --tag-text: #58a6ff;
      --highlight: #f0883e;
      --green: #3fb950;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
    header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 24px 0; margin-bottom: 32px; }
    header .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    header h1 { font-size: 1.5rem; color: var(--accent); }
    header h1 span { color: var(--text); font-weight: 400; }
    .date-selector { position: relative; }
    .date-selector select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; font-size: 0.875rem; cursor: pointer; }
    .day-meta { margin-bottom: 24px; }
    .day-meta h2 { font-size: 1.25rem; margin-bottom: 4px; }
    .day-meta p { color: var(--text-secondary); font-size: 0.875rem; }
    .stats { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; text-align: center; min-width: 80px; flex: 1; }
    .stat .num { font-size: 1.5rem; font-weight: 700; color: var(--accent); display: block; }
    .stat .label { font-size: 0.75rem; color: var(--text-secondary); }
    .section { margin-bottom: 32px; }
    .section h3 { font-size: 1.1rem; color: var(--highlight); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .paper { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 12px; transition: border-color 0.2s; }
    .paper:hover { border-color: var(--accent); }
    .paper h4 { font-size: 1.05rem; color: var(--accent); margin-bottom: 6px; }
    .paper h4 a { color: inherit; text-decoration: none; }
    .paper h4 a:hover { text-decoration: underline; }
    .paper .meta { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; }
    .paper .meta span { margin-right: 12px; }
    .paper .abstract { font-size: 0.9rem; margin-bottom: 10px; line-height: 1.65; }
    .paper .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .paper .tags .tag { background: var(--tag-bg); color: var(--tag-text); font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; border: 1px solid var(--border); }
    .paper .links { display: flex; gap: 10px; font-size: 0.8rem; }
    .paper .links a { color: var(--green); text-decoration: none; }
    .paper .links a:hover { text-decoration: underline; }
    .news-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-bottom: 10px; }
    .news-item h4 { font-size: 0.95rem; color: var(--accent); margin-bottom: 4px; }
    .news-item p { font-size: 0.85rem; color: var(--text-secondary); }
    .news-item a { color: var(--green); font-size: 0.8rem; text-decoration: none; }
    .news-item a:hover { text-decoration: underline; }
    footer { text-align: center; padding: 32px 0; color: var(--text-secondary); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 48px; }
    footer a { color: var(--accent); text-decoration: none; }
    .no-data { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .no-data .icon { font-size: 3rem; display: block; margin-bottom: 12px; }
    @media (max-width: 600px) {
      header .container { flex-direction: column; align-items: flex-start; }
      .stats { gap: 8px; }
      .stat { padding: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>🎙️ Audio Daily Report <span>/ {{DATE}}</span></h1>
      <div class="date-selector">
        <select id="dateSelect" onchange="jumpToDate(this.value)">
          <option value="">📅 选择日期...</option>
        </select>
      </div>
    </div>
  </header>
  <main class="container">
    <div class="day-meta">
      <h2>📊 今日速览</h2>
      <p>{{DATE_DISPLAY}} · 自动抓取自 arXiv / HuggingFace / Papers With Code 等</p>
    </div>
    <div class="stats">
      <div class="stat"><span class="num">{{PAPER_COUNT}}</span><span class="label">📄 论文</span></div>
      <div class="stat"><span class="num">{{NEWS_COUNT}}</span><span class="label">📰 前沿新闻</span></div>
      <div class="stat"><span class="num">{{HIGHLIGHT_COUNT}}</span><span class="label">⭐ 重点推荐</span></div>
    </div>
    {{CONTENT}}
  </main>
  <footer>
    <p>🤖 由 AI 自动生成 · <a href="https://github.com/natashastone-hub/audio-daily-report" target="_blank">GitHub</a> · 每日推送</p>
  </footer>
  <script>
    // Load available dates list
    fetch('/audio-daily-report/dates.json')
      .then(r => r.json())
      .then(dates => {
        const sel = document.getElementById('dateSelect');
        dates.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          if (d === '{{DATE}}') opt.selected = true;
          sel.appendChild(opt);
        });
      })
      .catch(() => {});
    function jumpToDate(date) {
      if (date) window.location.href = 'reports/' + date + '.html';
    }
  </script>
</body>
</html>
